<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng nhập hệ thống</title>
<link rel="stylesheet" href="mobile.css">
<script src="js/app-config.js"></script>
<script src="mobile-common.js"></script>
</head><body>
<div id="loginScreen" class="login">
  <div class="login-card">
    <h1>Đăng nhập hệ thống</h1>
    <div class="muted">Tài khoản NVBH sẽ tự vào App bán hàng. Tài khoản giao hàng sẽ tự vào App giao hàng.</div>
    <div class="field"><label>Tài khoản</label><input id="loginUser" autocomplete="username"></div>
    <div class="field"><label>Mật khẩu</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn green full" onclick="login()">Đăng nhập</button>
  </div>
</div>
<div id="appShell" class="app-shell hidden">
  <div class="card">
    <h1>Đang chuyển đúng app...</h1>
    <div class="muted">Nếu không tự chuyển, hãy mở sales-app.html hoặc delivery-app.html</div>
  </div>
</div>
<script>
function afterLoad(){redirectByRole();}
</script>
</body></html>
