<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>App giao hàng - Kho Minh Khai</title>
<link rel="stylesheet" href="mobile.css">
<script src="mobile-common.js"></script>
</head><body>
<div id="loginScreen" class="login">
  <div class="login-card">
    <h1>Đăng nhập App giao hàng</h1>
    <div class="field"><label>Tài khoản</label><input id="loginUser" autocomplete="username"></div>
    <div class="field"><label>Mật khẩu</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn green full" onclick="login()">Đăng nhập</button>
  </div>
</div>
<div id="appShell" class="app-shell hidden">
  <div class="top-card">
    <div class="top-row"><div><h1>App giao hàng</h1><div class="muted" id="currentUserName"></div></div><button class="btn red" onclick="logout()">Thoát</button></div>
  </div>
  <section data-view="orders">
    <div class="kpi"><div><span>Tổng đơn hôm nay</span><b id="kpiOrders">0</b></div><div><span>Còn phải thu</span><b id="kpiDebt">0</b></div></div>
    <div class="search"><input id="orderSearch" placeholder="Tìm đơn/khách..." oninput="renderOrders()"></div>
    <div id="orderList" class="list"></div>
  </section>
  <section data-view="debt" class="hidden">
    <div id="debtList" class="list"></div>
  </section>
  <section data-view="report" class="hidden">
    <div class="card">
      <h1>Báo cáo nộp tiền</h1>
      <div class="field"><label>Tiền mặt</label><input id="cashReport" inputmode="numeric" type="tel"></div>
      <div class="field"><label>Chuyển khoản</label><input id="bankReport" inputmode="numeric" type="tel"></div>
      <div class="field"><label>Tiền hàng trả về</label><input id="returnReport" inputmode="numeric" type="tel"></div>
      <div class="field"><label>Ghi chú</label><textarea id="reportNote"></textarea></div>
      <button class="btn green full" onclick="saveReport()">Lưu báo cáo</button>
    </div>
  </section>
</div>
<div class="tabs">
  <button class="tab active" data-tab="orders" onclick="showTab('orders')">Đơn</button>
  <button class="tab" data-tab="debt" onclick="showTab('debt')">Công nợ</button>
  <button class="tab" data-tab="report" onclick="showTab('report')">Báo cáo</button>
</div>
<script>
function afterLoad(){renderOrders();renderDebt();}
function myCode(){return String(CURRENT_USER?.deliveryStaffCode||CURRENT_USER?.code||CURRENT_USER?.username||'').toLowerCase()}
function orderPaid(o){return (Number(o.cashPaid)||0)+(Number(o.bankPaid)||0)}
function orderDebt(o){return Math.max(0,(Number(o.total)||0)-orderPaid(o)-(Number(o.returnGoodsAmount)||0))}
function myOrders(){
  const code=myCode();
  return (db.orders||[]).filter(o=>{
    const d=String(o.date||'').slice(0,10)===todayStr();
    const mine=!code || norm(o.deliveryStaffCode||o.deliveryCode||'').includes(code) || !o.deliveryStaffCode;
    return d && mine;
  });
}
function renderOrders(){
  const q=norm(document.getElementById('orderSearch')?.value||'');
  let rows=myOrders().filter(o=>!q || norm([o.id,o.customer,o.customerCode,o.deliveryStaffName].join(' ')).includes(q));
  document.getElementById('kpiOrders').textContent=rows.length;
  document.getElementById('kpiDebt').textContent=money(rows.reduce((s,o)=>s+orderDebt(o),0));
  document.getElementById('orderList').innerHTML=rows.map(o=>`
    <div class="order-card">
      <div class="sku">${esc(o.id||'')}</div><div class="name">${esc(o.customer||o.customerName||'')}</div>
      <div class="meta"><div><span>Tổng đơn</span><b>${money(o.total)}</b></div><div><span>Còn nợ</span><b>${money(orderDebt(o))}</b></div></div>
      <div class="qty-grid"><input id="cash_${esc(o.id)}" type="tel" inputmode="numeric" placeholder="Tiền mặt"><input id="bank_${esc(o.id)}" type="tel" inputmode="numeric" placeholder="Chuyển khoản"></div>
      <div class="field"><input id="ret_${esc(o.id)}" type="tel" inputmode="numeric" placeholder="Giá trị hàng trả về"></div>
      <button class="btn green full" onclick="confirmDelivery('${esc(o.id)}')">Cập nhật giao hàng</button>
    </div>`).join('') || '<div class="card muted">Không có đơn hôm nay</div>';
}
async function confirmDelivery(id){
  const o=(db.orders||[]).find(x=>String(x.id)===String(id)); if(!o)return;
  const cash=Number(document.getElementById('cash_'+id)?.value)||0;
  const bank=Number(document.getElementById('bank_'+id)?.value)||0;
  const ret=Number(document.getElementById('ret_'+id)?.value)||0;
  o.cashPaid=(Number(o.cashPaid)||0)+cash; o.bankPaid=(Number(o.bankPaid)||0)+bank;
  if(ret>0){
    db.returns=db.returns||[];
    db.returns.push({id:'RT-'+Date.now(),orderId:o.id,customerCode:o.customerCode||'',customerName:o.customer||'',amount:ret,date:new Date().toISOString(),source:'delivery-app'});
    o.returnGoodsAmount=(Number(o.returnGoodsAmount)||0)+ret;
  }
  o.debt=orderDebt(o); o.status=o.debt>0?'Đã giao còn nợ':'Đã giao đủ tiền';
  try{await saveData(); await loadData(); renderOrders(); renderDebt(); toast('Đã cập nhật')}catch(e){toast(e.message||'Không lưu được')}
}
function renderDebt(){
  const rows=(db.orders||[]).filter(o=>orderDebt(o)>0);
  document.getElementById('debtList').innerHTML=rows.map(o=>`
    <div class="order-card"><div class="sku">${esc(o.id||'')}</div><div class="name">${esc(o.customer||'')}</div>
    <div class="meta"><div><span>Tổng đơn</span><b>${money(o.total)}</b></div><div><span>Còn nợ</span><b>${money(orderDebt(o))}</b></div></div></div>`).join('') || '<div class="card muted">Không có công nợ</div>';
}
async function saveReport(){
  db.deliveryReports=db.deliveryReports||[];
  db.deliveryReports.push({id:'RP-'+Date.now(),date:new Date().toISOString(),deliveryCode:CURRENT_USER?.username||'',cash:Number(cashReport.value)||0,bank:Number(bankReport.value)||0,returnGoods:Number(returnReport.value)||0,note:reportNote.value||''});
  try{await saveData(); toast('Đã lưu báo cáo')}catch(e){toast(e.message||'Không lưu được báo cáo')}
}
</script>
</body></html>
