<section id="orders" class="section"><div class="card panel"><div class="panel-head"><h2>Đơn hàng</h2><div class="toolbar"><button class="btn green" onclick="printSelectedOrders()">In các đơn đã chọn</button><button class="btn red" onclick="bulkDeleteOrders()">Xóa đơn đã chọn</button><button class="btn light" onclick="downloadBulkOrderTemplate()">Tải mẫu import</button><button class="btn orange" onclick="document.getElementById('importBulkOrders').click()">Import nhiều đơn</button><input id="importBulkOrders" type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importBulkOrdersExcel(event)"><button class="btn light" onclick="page('mergeOrders')">Gộp đơn tổng</button><button class="btn" onclick="exportOrders()">Xuất Excel</button></div></div>
        <div class="filter-grid">
          <div class="field"><label>Từ ngày</label><input id="orderFilterFrom" type="date" oninput="render()"></div>
          <div class="field"><label>Đến ngày</label><input id="orderFilterTo" type="date" oninput="render()"></div>
          <div class="field wide"><label>Tên NVBH</label><input id="orderFilterStaff" placeholder="Nhập tên nhân viên" oninput="render()"></div>
          <div class="field"><label>Mã khách hàng</label><input id="orderFilterCustomerCode" placeholder="VD: KH001" oninput="render()"></div>
          <div class="field wide"><label>Tên khách hàng</label><input id="orderFilterCustomerName" placeholder="Nhập tên khách" oninput="render()"></div>
          <div class="filter-actions"><button class="btn light" onclick="clearOrderFilters()">Xóa lọc</button></div>
        </div>
        <div class="table-wrap"><table class="table"><thead><tr><th class="center"><input type="checkbox" id="selectAllPrintOrders" onchange="toggleAllPrintOrders(this)"></th><th>Mã đơn</th><th>Ngày</th><th>Mã KH</th><th>Khách hàng</th><th>Nhân viên</th><th class="right">Tổng tiền</th><th class="right">Đã thu</th><th class="right">Công nợ</th><th>TT thanh toán</th><th class="center">Số dòng</th><th class="center">Trạng thái gộp</th><th>Thao tác</th></tr></thead><tbody id="ordersBody"></tbody></table></div></div></section>
