<section id="customers" class="section">
  <div class="card panel">
    <div class="panel-head">
      <h2>Khách hàng</h2>
      <div class="toolbar">
        <button class="btn light" onclick="downloadCustomerTemplate()">Tải mẫu KH</button>
        <button class="btn green" onclick="document.getElementById('importCustomer').click()">Import KH</button>
        <input id="importCustomer" type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importCustomers(event)">
        <button class="btn" onclick="exportCustomers()">Xuất Excel</button>
        <button class="btn red" onclick="bulkDeleteCustomers()">Xóa KH đã chọn</button>
      </div>
    </div>
    <div class="form">
      <div class="field"><label>Mã KH</label><input id="cCode"></div>
      <div class="field"><label>Tên KH</label><input id="cName"></div>
      <div class="field"><label>Địa chỉ</label><input id="cAddress"></div>
      <div class="field"><label>SĐT</label><input id="cPhone"></div>
      <div class="field"><label>MST</label><input id="cTax"></div>
      <div class="field"><label>Nhóm khách hàng</label><input id="cGroup" list="customerGroupList" placeholder="VD: Tạp hóa tuyến 1"></div>
    </div><br>
    <button class="btn" onclick="saveCustomer()">Lưu khách hàng</button>
  </div>

  <div class="card panel">
    <div class="panel-head"><h2>Tạo nhóm khách hàng</h2>
      <div class="toolbar">
        <button class="btn light" onclick="downloadCustomerGroupTemplate()">Tải mẫu nhóm KH</button>
        <button class="btn orange" onclick="document.getElementById('importCustomerGroupFile').click()">Import nhóm KH</button>
        <input id="importCustomerGroupFile" type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="importCustomerGroupExcel(event)">
      </div>
    </div>
    <div class="form">
      <div class="field"><label>Tên nhóm khách hàng</label><input id="customerGroupName" placeholder="VD: Khách sỉ"></div>
      <div class="field wide"><label>Danh sách mã KH</label><input id="customerGroupCodes" placeholder="Nhập mã KH, cách nhau bằng dấu phẩy"></div>
    </div><br>
    <button class="btn green" onclick="saveCustomerGroup()">Lưu nhóm khách hàng</button>
  </div>

  <div class="card panel">
    <div class="table-wrap"><table class="table"><thead><tr><th class="center"><input type="checkbox" onchange="toggleAllByClass('customer-delete-check',this.checked)"></th><th>Mã KH</th><th>Tên</th><th>Địa chỉ</th><th>SĐT</th><th>MST</th><th>Nhóm KH</th><th>Hành động</th></tr></thead><tbody id="customerBody"></tbody></table></div>
  </div>

  <div class="card panel">
    <div class="panel-head"><h2>Danh sách nhóm khách hàng</h2></div>
    <div class="table-wrap"><table class="table"><thead><tr><th>Tên nhóm</th><th>Danh sách mã KH</th><th>Thao tác</th></tr></thead><tbody id="customerGroupBody"></tbody></table></div>
  </div>
  <datalist id="customerGroupList"></datalist>
</section>
