<section id="mergeOrders" class="section">
        <div class="card panel">
          <div class="panel-head"><div><h2>Gộp đơn tổng</h2><div class="muted" style="margin-top:6px">Chọn các đơn con chưa gộp. Khi tạo đơn tổng, phần mềm sẽ <b>cộng gộp sản phẩm trùng SKU</b> thành một bảng hàng tổng hợp.</div></div><div class="toolbar"><button class="btn green" onclick="createMasterOrder()">Tạo đơn tổng</button><button class="btn light" onclick="render()">Làm mới</button></div></div>
          <div class="form"><div class="field"><label>Mã đơn tổng</label><input id="masterId" placeholder="Tự sinh nếu bỏ trống"></div><div class="field"><label>Nhân viên giao hàng</label><select id="masterDeliveryStaff"></select></div><div class="field"><label>Ghi chú đơn tổng</label><input id="masterNote" placeholder="VD: Gộp giao tuyến Kiến Xương"></div></div><br>
          <div class="filter-grid">
            <div class="field"><label>Từ ngày</label><input id="mergeFilterFrom" type="date" oninput="render()"></div>
            <div class="field"><label>Đến ngày</label><input id="mergeFilterTo" type="date" oninput="render()"></div>
            <div class="field wide"><label>Nhân viên</label><input id="mergeFilterStaff" placeholder="Tên NVBH" oninput="render()"></div>
            <div class="field"><label>Mã KH</label><input id="mergeFilterCustomerCode" placeholder="KH..." oninput="render()"></div>
            <div class="field wide"><label>Tên KH</label><input id="mergeFilterCustomerName" placeholder="Tên khách" oninput="render()"></div>
            <div class="filter-actions"><button class="btn light" onclick="clearMergeFilters()">Xóa lọc</button></div>
          </div>
          <div class="table-wrap"><table class="table"><thead><tr><th class="center"><input type="checkbox" onchange="toggleAllMergeOrders(this)"></th><th>Mã đơn con</th><th>Ngày</th><th>Mã KH</th><th>Khách hàng</th><th>Nhân viên</th><th class="right">Tổng tiền</th><th class="center">Trạng thái</th></tr></thead><tbody id="mergeOrderBody"></tbody></table></div>
        </div>
        <div class="card panel"><div class="panel-head"><h2>Danh sách đơn tổng</h2></div>
          <div class="filter-grid">
            <div class="field"><label>Từ ngày</label><input id="masterFilterFrom" type="date" oninput="render()"></div>
            <div class="field"><label>Đến ngày</label><input id="masterFilterTo" type="date" oninput="render()"></div>
            <div class="field"><label>Mã đơn tổng</label><input id="masterFilterId" placeholder="GT..." oninput="render()"></div>
            <div class="field wide"><label>Ghi chú</label><input id="masterFilterNote" placeholder="Tìm ghi chú" oninput="render()"></div>
            <div class="field wide"><label>SKU / tên hàng</label><input id="masterFilterProduct" placeholder="Tìm sản phẩm trong đơn tổng" oninput="render()"></div>
            <div class="filter-actions"><button class="btn light" onclick="clearMasterFilters()">Xóa lọc</button></div>
          </div>
          <div class="table-wrap"><table class="table"><thead><tr><th>Mã đơn tổng</th><th>Ngày tạo</th><th class="center">Số đơn con</th><th class="center">Số mặt hàng</th><th class="right">Tổng SL</th><th class="right">Tổng tiền hàng</th><th>Nhân viên GH</th><th>Ghi chú</th><th>Thao tác</th></tr></thead><tbody id="masterOrdersBody"></tbody></table></div></div>
      </section>
