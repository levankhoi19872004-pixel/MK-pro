.shell { width:min(100%,430px); margin:auto; min-height:780px; background:#fff; border-radius:22px; box-shadow:0 16px 48px rgba(35,55,80,.16); overflow:hidden; display:flex; flex-direction:column; }
.header { padding:18px 18px 14px; color:#fff; background:linear-gradient(135deg,#203a72,#315f9c); }
.header small { opacity:.82; }
.header h1 { font-size:20px; margin:4px 0 0; }
.toolbar { padding:12px; display:grid; grid-template-columns:1fr auto; gap:8px; border-bottom:1px solid #e8edf3; background:#f9fbfd; position:sticky; top:0; z-index:2; }
.search { position:relative; }
.search input { width:100%; min-height:44px; padding:0 40px 0 13px; border:1px solid #cfd9e6; border-radius:12px; font-size:15px; }
.search button { position:absolute; right:6px; top:6px; width:32px; height:32px; border:0; border-radius:9px; background:#e8eef6; font-size:18px; cursor:pointer; }
.toolbar>button { min-height:44px; padding:0 14px; border:0; border-radius:12px; color:#fff; background:#2e66a5; font-weight:700; cursor:pointer; }
.meta { display:flex; gap:8px; padding:10px 12px 4px; flex-wrap:wrap; }
.badge { border-radius:999px; background:#edf4ff; color:#24558e; padding:6px 10px; font-size:12px; font-weight:700; }
.list { flex:1; overflow:auto; padding:8px 12px 18px; min-height:560px; }
.card { display:grid; grid-template-columns:44px 1fr auto; gap:10px; align-items:center; border:1px solid #e3eaf2; border-radius:14px; padding:11px; margin-bottom:9px; background:#fff; content-visibility:auto; contain-intrinsic-size:68px; }
.avatar { width:42px; height:42px; border-radius:13px; display:grid; place-items:center; background:#e9f2ff; color:#245b9a; font-weight:800; }
.card strong { display:block; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:210px; }
.card span { display:block; margin-top:4px; color:#637083; font-size:12px; }
.card button { border:0; border-radius:10px; padding:9px 11px; background:#e8f1fb; color:#1f568f; font-weight:700; cursor:pointer; }
.mobile-list-state { min-height:300px; display:grid; place-items:center; text-align:center; padding:30px; }
.mobile-state-content { display:grid; gap:8px; color:#556579; }
.mobile-state-content strong { color:#23344d; }
.mobile-skeleton { width:100%; display:grid; gap:12px; }
.mobile-skeleton span { display:block; height:68px; border-radius:14px; background:linear-gradient(90deg,#eef2f6,#f8fafc,#eef2f6); background-size:200% 100%; animation:pulse 1.2s infinite; }
@keyframes pulse { to { background-position:-200% 0; } }
.footer { border-top:1px solid #e7edf4; padding:10px 12px; color:#66758a; font-size:12px; background:#fff; }
</style>
</head>
<body>
<div class="shell">
  <header class="header"><small>MK-Pro · Phase 08</small><h1>Danh sách khách hàng</h1></header>
  <div class="toolbar">
    <div class="search"><input id="search" aria-label="Tìm kiếm" placeholder="Tìm mã hoặc tên khách hàng"><button id="clear" aria-label="Xóa tìm kiếm">×</button></div>
    <button id="reload">Tải lại</button>
  </div>
  <div class="meta"><span class="badge" id="count">120 khách</span><span class="badge">1 delegated listener</span><span class="badge">60 dòng đầu</span></div>
  <main id="list" class="list" aria-live="polite"></main>
  <footer class="footer" id="status">Chunked DOM render · request gate · lifecycle cleanup</footer>
</div>

<script>
(function(){
  const list=document.getElementById('list');
  const input=document.getElementById('search');
  const rows=Array.from({length:120},(_,i)=>({code:'KH'+String(i+1).padStart(4,'0'),name:'Khách hàng mẫu '+(i+1),debt:(i*7913)%900000}));
  const lifecycle=MobileUiRuntime.createLifecycle();
  const renderer=MobileUiRuntime.createChunkedHtmlRenderer(list,{initialCount:60,chunkSize:30});
  const escape=(v)=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const money=(v)=>new Intl.NumberFormat('vi-VN').format(v)+' đ';
  function card(row){ return '<article class="card" data-code="'+escape(row.code)+'"><div class="avatar">'+escape(row.code.slice(-2))+'</div><div><strong title="'+escape(row.name)+'">'+escape(row.code)+' - '+escape(row.name)+'</strong><span>Công nợ: '+money(row.debt)+'</span></div><button type="button" data-open="'+escape(row.code)+'">Mở</button></article>'; }
  function render(){
    const q=input.value.trim().toLowerCase();
    const filtered=rows.filter(r=>!q||r.code.toLowerCase().includes(q)||r.name.toLowerCase().includes(q));
    document.getElementById('count').textContent=filtered.length+' khách';
    renderer.render(filtered,card,{className:'list',renderEmpty:(node)=>MobileUiRuntime.renderState(node,{state:'empty',className:'list',title:'Không tìm thấy khách hàng',detail:'Hãy đổi từ khóa tìm kiếm.'})});
  }
  const debounced=MobileUiRuntime.debounce(render,250);
  lifecycle.listen(input,'input',debounced);
  lifecycle.listen(document.getElementById('clear'),'click',()=>{input.value='';render();input.focus();});
  lifecycle.listen(document.getElementById('reload'),'click',()=>{MobileUiRuntime.renderState(list,{state:'loading',className:'list',title:'Đang tải dữ liệu'});setTimeout(render,350);});
  lifecycle.delegate(list,'click','[data-open]',(_e,button)=>{document.getElementById('status').textContent='Đã mở '+button.dataset.open+' bằng event delegation';});
  lifecycle.listen(window,'pagehide',()=>{debounced.cancel();renderer.cancel();lifecycle.destroy();},{once:true});

</script>
