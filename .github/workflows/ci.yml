name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:syntax
      - run: npm run docs:check
      - run: npm test
        env:
          NODE_ENV: test
          ALLOW_LEGACY_UNTYPED_TOKENS: 'false'
      - run: npm audit --omit=dev --audit-level=high
