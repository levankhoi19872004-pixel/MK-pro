name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --registry=https://registry.npmjs.org/
      - run: npm run quality
        env:
          NODE_ENV: test
          ALLOW_LEGACY_UNTYPED_TOKENS: 'false'
