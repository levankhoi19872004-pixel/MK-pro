<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V44 Mobile - Giao hàng</title>
  <link rel="stylesheet" href="./mobile.css" />
</head>
<body>
  <main class="mobile-page">
    <header class="mobile-header">
      <div>
        <h1>Giao hàng mobile</h1>
        <p id="staffInfo">Đang tải...</p>
      </div>
      <button id="logoutBtn" class="ghost-btn">Thoát</button>
    </header>

    <section class="card">
      <div class="section-title-row">
        <h2>Đơn cần giao</h2>
        <button id="reloadOrdersBtn" class="ghost-btn small-btn">Tải lại</button>
      </div>
      <div class="delivery-date-toolbar">
        <label for="deliveryDateInput">Ngày giao</label>
        <input id="deliveryDateInput" type="date" />
        <button id="todayOrdersBtn" class="ghost-btn small-btn" type="button">Hôm nay</button>
      </div>
      <p id="deliveryFormula" class="formula-note">App lọc theo ngày giao + nhân viên giao đang đăng nhập.</p>
      <div id="deliveryOrders" class="order-list empty">Chưa có đơn</div>
      <p id="deliveryMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Nộp tiền mặt về quỹ</h2>
      <input id="cashAmountInput" type="number" min="0" placeholder="Số tiền mặt nộp về thủ quỹ" />
      <textarea id="cashNoteInput" rows="2" placeholder="Ghi chú nếu có"></textarea>
      <button id="submitCashBtn" class="primary-btn full-btn">Ghi nhận nộp quỹ</button>
      <p id="cashMessage" class="message"></p>
    </section>
  </main>

  <script type="module" src="./js/delivery.js"></script>
</body>
</html>
