<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V43 Mobile - Đăng nhập</title>
  <link rel="stylesheet" href="./mobile.css" />
</head>
<body>
  <main class="mobile-page auth-page">
    <section class="auth-card">
      <div class="brand-box">
        <div class="brand-logo">V43</div>
        <h1>Đăng nhập Mobile</h1>
        <p>Admin / Kế toán / Bán hàng / Giao hàng</p>
      </div>

      <form id="loginForm" class="form-stack">
        <label>Tài khoản</label>
        <input id="username" type="text" autocomplete="username" placeholder="Nhập tài khoản" required />

        <label>Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required />

        <button type="submit" class="primary-btn">Đăng nhập</button>
      </form>

      <div class="login-hint"><strong>Tài khoản mẫu:</strong><br>admin/admin · ketoan/123456 · banhang/123456 · giaohang/123456</div>
      <p id="loginMessage" class="message"></p>
    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
