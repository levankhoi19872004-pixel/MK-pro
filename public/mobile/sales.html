<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V44 Mobile - Bán hàng</title>
  <link rel="stylesheet" href="./mobile.css" />
</head>
<body>
  <main class="mobile-page">
    <header class="mobile-header">
      <div>
        <h1>Bán hàng mobile</h1>
        <p id="staffInfo">Đang tải...</p>
      </div>
      <button id="logoutBtn" class="ghost-btn">Thoát</button>
    </header>

    <section class="card">
      <h2>1. Chọn khách hàng</h2>
      <input id="customerSearch" type="search" placeholder="Gõ mã / tên / SĐT / địa chỉ khách hàng" />
      <div id="customerSuggestions" class="suggestion-box"></div>
      <div id="selectedCustomer" class="selected-box muted">Chưa chọn khách hàng</div>
    </section>

    <section class="card">
      <h2>2. Chọn sản phẩm</h2>
      <input id="productSearch" type="search" placeholder="Gõ mã / tên sản phẩm" />
      <div id="productSuggestions" class="suggestion-box"></div>

      <div class="qty-row">
        <input id="caseQtyInput" type="number" min="0" placeholder="Thùng" />
        <input id="looseQtyInput" type="number" min="0" placeholder="Lẻ" />
        <button id="addItemBtn" class="primary-btn">Thêm</button>
      </div>
      <div id="selectedProduct" class="selected-box muted">Chưa chọn sản phẩm</div>
    </section>

    <section class="card">
      <div class="section-title-row">
        <h2>3. Giỏ hàng</h2>
        <span id="cartCount" class="pill">0 dòng</span>
      </div>
      <div id="cartList" class="cart-list empty">Chưa có sản phẩm</div>

      <div class="total-box">
        <span>Tổng đơn</span>
        <strong id="cartTotal">0</strong>
      </div>

      <label class="field-label">Tiền thu ngay nếu có</label>
      <input id="paidAmountInput" type="number" min="0" placeholder="Nhập số tiền đã thu" />

      <button id="submitOrderBtn" class="primary-btn full-btn">Gửi đơn về hệ thống tổng</button>
      <p id="salesMessage" class="message"></p>
    </section>

    <section class="card">
      <div class="section-title-row">
        <h2>Đơn đã chấm hôm nay</h2>
        <button id="reloadOrdersBtn" class="ghost-btn small-btn">Tải lại</button>
      </div>
      <div id="todayOrders" class="order-list empty">Chưa có đơn</div>
    </section>
  </main>

  <script type="module" src="./js/sales.js"></script>
</body>
</html>
